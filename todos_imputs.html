<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Todos Inputs</title>
</head>
<body>

    <h2>Exemplo de Todos os Inputs</h2>

    <form method="get">

        <label for="texto">Texto:</label>
        <input type="text" id="texto" name="texto" placeholder="Digite um texto"><br><br>

        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br><br>

        <label for="numero">Número:</label>
        <input type="number" id="numero" name="numero"><br><br>

        <label for="data">Data:</label>
        <input type="date" id="data" name="data"><br><br>

        <label for="hora">Hora:</label>
        <input type="time" id="hora" name="hora"><br><br>

        <label for="cor">Cor:</label>
        <input type="color" id="cor" name="cor"><br><br>

        <label for="arquivo">Arquivo:</label>
        <input type="file" id="arquivo" name="arquivo"><br><br>

        <label>Gênero:</label>
        <input type="radio" name="genero" value="masculino"> Masculino
        <input type="radio" name="genero" value="feminino"> Feminino<br><br>

        <label>Interesses:</label>
        <input type="checkbox" name="interesse" value="html"> HTML
        <input type="checkbox" name="interesse" value="css"> CSS<br><br>

        <label for="range">Range:</label>
        <input type="range" id="range" name="range"><br><br>

        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone"><br><br>

        <label for="url">Site:</label>
        <input type="url" id="url" name="url"><br><br>

        <input type="submit" value="Enviar">

    </form>

</body>
</html>
